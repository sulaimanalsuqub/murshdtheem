<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مرشد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
    <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <a href="../preview.html" class="logo"><div class="logo-icon">م</div><span class="logo-text">مرشد</span></a>
                <nav class="nav" id="mainNav">
                    <a href="../preview.html" class="nav-link">الرئيسية</a>
                    <a href="products.html" class="nav-link">المنتجات</a>
                    <a href="about.html" class="nav-link">من نحن</a>
                    <a href="contact.html" class="nav-link">تواصل معنا</a>
                </nav>
                <div class="header-actions">
                    <a href="cart.html" class="cart-btn"><i class="ri-shopping-bag-line"></i><span class="cart-count">3</span></a>
                    <button class="menu-toggle" id="menuToggle"><i class="ri-menu-line"></i></button>
                </div>
            </div>
        </div>
    </header>

    <section class="section" style="min-height:70vh;display:flex;align-items:center">
        <div class="container">
            <div class="auth-wrapper">
                <div class="auth-box">
                    <div style="text-align:center;margin-bottom:32px">
                        <a href="../preview.html" class="logo" style="justify-content:center"><div class="logo-icon" style="width:48px;height:48px;font-size:1.4rem">م</div></a>
                        <h1 class="auth-title">مرحباً بعودتك</h1>
                        <p class="auth-subtitle">سجل دخولك للوصول لمنتجاتك الرقمية</p>
                    </div>
                    <form class="auth-form">
                        <div class="form-group">
                            <label class="form-label">البريد الإلكتروني أو رقم الجوال</label>
                            <div class="input-icon-wrap"><i class="ri-mail-line input-icon"></i><input type="text" class="form-input form-input-icon" placeholder="example@email.com"></div>
                        </div>
                        <div class="form-group">
                            <div style="display:flex;justify-content:space-between;align-items:center"><label class="form-label">كلمة المرور</label><a href="#" class="form-link">نسيت كلمة المرور؟</a></div>
                            <div class="input-icon-wrap"><i class="ri-lock-line input-icon"></i><input type="password" class="form-input form-input-icon" placeholder="••••••••"></div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px">تسجيل الدخول</button>
                    </form>
                    <div class="auth-divider"><span>أو</span></div>
                    <div style="display:flex;flex-direction:column;gap:12px">
                        <button class="btn btn-social"><i class="ri-google-fill"></i> الدخول بحساب Google</button>
                        <button class="btn btn-social"><i class="ri-apple-fill"></i> الدخول بحساب Apple</button>
                    </div>
                    <p class="auth-footer">ليس لديك حساب؟ <a href="#" class="auth-link">إنشاء حساب جديد</a></p>
                </div>
            </div>
        </div>
    </section>
    <script src="../assets/js/app.js"></script>
</body>
</html>
